name: "Setup Cargo"
description: >
  Restores the Cargo cache and installs all Rust tooling.
  Fully self-contained so individual jobs remain reproducible on cache miss.

inputs:
  save-cache:
    description: "Save the cache after setup (use only in the cache-priming job)"
    default: "false"

runs:
  using: composite
  steps:
    # ~/.cargo/ is branch-independent: registry downloads and installed binaries
    # are identical regardless of which branch is being built.
    - name: Restore and save cargo registry cache
      if: inputs.save-cache == 'true'
      uses: actions/cache@v5
      with:
        path: |
          # Taken from <https://doc.rust-lang.org/nightly/cargo/guide/cargo-home.html#caching-the-cargo-home-in-ci>.
          ~/.cargo/bin
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          # contains package information of crates installed via `cargo install`.
          ~/.cargo/.crates.toml
          ~/.cargo/.crates2.json
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}-6
        restore-keys: ${{ runner.os }}-cargo-registry-

    - name: Restore cargo registry cache
      if: inputs.save-cache != 'true'
      uses: actions/cache/restore@v5
      with:
        path: |
          # Taken from <https://doc.rust-lang.org/nightly/cargo/guide/cargo-home.html#caching-the-cargo-home-in-ci>.
          ~/.cargo/bin
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          # contains package information of crates installed via `cargo install`.
          ~/.cargo/.crates.toml
          ~/.cargo/.crates2.json
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}-6
        restore-keys: ${{ runner.os }}-cargo-registry-

    # target/ is branch-specific: compiled artifacts and incremental compilation
    # data are tightly coupled to the source tree of the current branch. Sharing
    # target/ across branches causes Rust's incremental compiler to re-type-check
    # cached compilation units from files that no longer exist on the current
    # branch, producing phantom errors (e.g. E0053 on a deleted file).
    - name: Restore and save build cache
      if: inputs.save-cache == 'true'
      uses: actions/cache@v5
      with:
        path: target/
        key: ${{ runner.os }}-cargo-target-${{ github.head_ref || github.ref }}-${{ hashFiles('**/Cargo.lock') }}-6
        restore-keys: |
          ${{ runner.os }}-cargo-target-${{ github.head_ref || github.ref }}-
          ${{ runner.os }}-cargo-target-refs/heads/main-

    - name: Restore build cache
      if: inputs.save-cache != 'true'
      uses: actions/cache/restore@v5
      with:
        path: target/
        key: ${{ runner.os }}-cargo-target-${{ github.head_ref || github.ref }}-${{ hashFiles('**/Cargo.lock') }}-6
        restore-keys: |
          ${{ runner.os }}-cargo-target-${{ github.head_ref || github.ref }}-
          ${{ runner.os }}-cargo-target-refs/heads/main-

    # When a build cache from a different branch is seeded via the restore-keys
    # fallback above, incremental compilation data may still reference source
    # files that don't exist on the current branch. Clearing it is cheap and
    # avoids those phantom compilation errors on the first run of a new branch.
    - name: Clear incremental compilation data
      shell: bash
      run: find target -maxdepth 5 -name incremental -type d -exec rm -rf {} + 2>/dev/null || true

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install Rust tools
      shell: bash
      run: |
        command -v cargo-nextest   &>/dev/null || cargo install --locked cargo-nextest
        command -v cargo-insta     &>/dev/null || cargo install --locked cargo-insta
        command -v cargo-llvm-cov  &>/dev/null || cargo install --locked cargo-llvm-cov
        rustup component add llvm-tools

    - name: Fetch dependencies
      shell: bash
      run: cargo fetch

    - name: Install wasm-bindgen-cli
      shell: bash
      run: |
        REQUIRED_VERSION=$(grep -oP 'wasm-bindgen = "=\K[^"]+' crates/tlang_bindings_js/Cargo.toml)

        if ! cargo install --list | grep -q "wasm-bindgen-cli v$REQUIRED_VERSION"; then
            cargo install -f --locked wasm-bindgen-cli --version "$REQUIRED_VERSION"
        fi

    - name: Install wasm-pack
      shell: bash
      run: command -v wasm-pack &>/dev/null || cargo install --locked wasm-pack
